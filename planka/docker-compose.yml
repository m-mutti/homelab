services:
  planka:
    container_name: planka
    image: ghcr.io/plankanban/planka:latest
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${PLANKA_PORT:-3000}:1337"
    volumes:
      - planka-data:/app/data
    environment:
      BASE_URL: ${BASE_URL}
      DATABASE_URL: postgresql://postgres@postgres/planka
      SECRET_KEY: ${SECRET_KEY}
      TRUST_PROXY: ${TRUST_PROXY:-true}
      DEFAULT_LANGUAGE: ${DEFAULT_LANGUAGE:-en-US}
      OUTGOING_BLOCKED_HOSTS: ${OUTGOING_BLOCKED_HOSTS:-localhost,postgres}
    restart: on-failure

  postgres:
    container_name: planka_postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: planka
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - planka-db-data:/var/lib/postgresql/data
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d planka"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  planka-data:
  planka-db-data:
