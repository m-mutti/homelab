services:
  portainer:
    container_name: portainer
    image: portainer/portainer-ce:latest
    ports:
      - "${PORTAINER_PORT:-9000}:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer-data:/data
    environment:
      TZ: ${TZ}
    restart: always

volumes:
  portainer-data:
